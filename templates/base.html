<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Brick Calc{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: ['animate-dim-highlight', 'animate-price-update', 'opacity-0', 'animate-pulse'],
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: { DEFAULT: '#4f46e5', light: '#6366f1', dark: '#3730a3' },
            accent: { DEFAULT: '#f59e0b', hover: '#d97706' },
            surface: { DEFAULT: '#ffffff', alt: '#f8fafc', border: '#e2e8f0' },
          },
          animation: {
            'spin-slow': 'spin 2s linear infinite',
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11'; }
    .shimmer {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.08); }
    .page-fade { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulse-dot { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .dot-pulse { animation: pulse-dot 1.4s ease-in-out infinite; }
    .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dimHighlight { 0% { box-shadow: 0 0 0 0 rgba(79,70,229,0.3); } 100% { box-shadow: 0 0 0 0 rgba(79,70,229,0); } }
    .animate-dim-highlight { animation: dimHighlight 1s ease-out; }
    @keyframes priceUpdate { 0% { filter: brightness(1.2); } 100% { filter: brightness(1); } }
    .animate-price-update { animation: priceUpdate 0.6s ease-out; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-700 antialiased" style="background-image: radial-gradient(ellipse at 50% 0%, rgba(79,70,229,0.03) 0%, transparent 60%);">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-lg border-b border-slate-200/60 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-3 group">
           <div class="w-9 h-9 bg-gradient-to-br from-brand-light to-brand-dark rounded-xl flex items-center justify-center text-white text-lg shadow-sm group-hover:shadow-md transition-shadow">🧱</div>
          <div>
            <div class="text-slate-800 font-bold text-base leading-tight group-hover:text-brand transition-colors">Brick Calc</div>
            <div class="text-slate-400 text-[11px] font-medium tracking-wide">LEGO Teile Finder</div>
          </div>
        </a>
        <div class="hidden sm:flex items-center gap-2">
          <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-brand bg-brand/5 px-3 py-1.5 rounded-full border border-brand/10"><span class="w-1.5 h-1.5 rounded-full bg-brand"></span>SNAP</span>
          <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>wobrick</span>
          <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-100"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>brickwith</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  {% block breadcrumb %}{% endblock %}

  <!-- Main -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 page-fade">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
